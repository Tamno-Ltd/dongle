# --- Dongle cpuapp (application core) image ---
# USB HID mouse host-facing side. Receives 7-byte mouse reports from the
# cpurad ESB receiver over ICBMSG IPC and submits them to the USB host.

# --- USB device stack (new stack required for the nRF54H20 USBHS) ---
CONFIG_USB_DEVICE_STACK_NEXT=y
# Disable DWC2 DMA — nrf_desktop disables it for stability on nRF54H20.
CONFIG_UDC_DWC2_DMA=n
# VBUS ready timeout — keeps usbd_enable() from blocking forever with no cable.
CONFIG_UDC_DWC2_USBHS_VBUS_READY_TIMEOUT=100
# UDC buffer pool — default 1024 is too small; Windows issues control requests
# with wLength=4095 (MS OS descriptor probe) which fails allocation otherwise.
CONFIG_UDC_BUF_POOL_SIZE=8192
# Suppress per-packet USB protocol chatter — only show warnings/errors.
CONFIG_USBD_LOG_LEVEL_WRN=y
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=y

# --- Inter-core IPC to cpurad (ICBMSG) ---
# The ICBMSG backend auto-selects (default y) given MBOX + the cpuapp_cpurad_ipc
# DT node from the DK base DTS.
CONFIG_IPC_SERVICE=y
CONFIG_MBOX=y
# Boot cpurad at runtime so the cpuapp<->cpurad IPC endpoint can bind.
# Without this the radio core stays held in reset and the IPC bind times out.
CONFIG_SOC_NRF54H20_CPURAD_ENABLE=y

# --- RTT logging (cpuapp owns RTT; the radio core is headless) ---
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_RTT=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096

# Route printk() to RTT too, so both LOG_INF() and printk() are visible.
CONFIG_CONSOLE=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y
CONFIG_LOG_PRINTK=y

CONFIG_BOOT_BANNER=n
