# --- ESB receiver (PRX) ---
CONFIG_ESB=y
CONFIG_ESB_MAX_PAYLOAD_LENGTH=32

# HF clock for the radio (nRF54H20 selects CLOCK_CONTROL_NRF2 via the SoC).
CONFIG_CLOCK_CONTROL=y

# --- RTT logging, matching Tempo's development path ---
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_RTT=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096

# Route printk() to RTT too, so both LOG_INF() and printk() are visible.
CONFIG_CONSOLE=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y
CONFIG_LOG_PRINTK=y

CONFIG_BOOT_BANNER=n
