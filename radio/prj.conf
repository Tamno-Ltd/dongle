# --- Dongle cpurad (radio core) image ---
# ESB receiver (PRX). Receives ESB mouse packets and forwards each one to
# cpuapp over the ICBMSG IPC link for submission as a USB HID report.

# --- ESB receiver (PRX) ---
CONFIG_ESB=y
CONFIG_ESB_MAX_PAYLOAD_LENGTH=32
# Match the tempo PTX (CONFIG_ESB_FAST_SWITCHING=y): 4 Mbps with the fast radio
# ramp so the auto-ACK turnaround timing lines up on both ends.
CONFIG_ESB_FAST_SWITCHING=y

# HF clock for the radio (nRF54H20 selects CLOCK_CONTROL_NRF2 via the SoC).
CONFIG_CLOCK_CONTROL=y

# --- Inter-core IPC to cpuapp (ICBMSG) via cpuapp_cpurad_ipc ---
CONFIG_IPC_SERVICE=y
CONFIG_IPC_SERVICE_BACKEND_ICBMSG=y
CONFIG_MBOX=y

# --- RTT logging on cpurad ---
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_RTT_MODE_DROP=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096

# Route printk() to RTT as well if bring-up code uses it.
CONFIG_CONSOLE=y
CONFIG_RTT_CONSOLE=y
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y
CONFIG_LOG_PRINTK=y
CONFIG_BOOT_BANNER=n

# Kernel sizing (matches the proven tempo radio image).
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_ISR_STACK_SIZE=1024
CONFIG_IDLE_STACK_SIZE=512
