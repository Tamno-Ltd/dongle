name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git cmake ninja-build gperf ccache dfu-util device-tree-compiler wget \
            python3-dev python3-pip python3-setuptools python3-wheel \
            xz-utils file make gcc gcc-multilib g++-multilib libsdl2-dev libmagic1

      - name: Install west
        run: pip3 install west

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: dongle

      - name: West init and update
        run: |
          west init -l dongle
          west update --narrow -o=--depth=1

      - name: Install Python requirements
        run: |
          pip3 install -r zephyr/scripts/requirements-base.txt \
                       -r nrf/scripts/requirements-base.txt \
                       -r nrf/scripts/requirements-build.txt

      - name: Install Zephyr SDK (ARM + RISC-V toolchains)
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.4/zephyr-sdk-0.17.4_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.17.4_linux-x86_64_minimal.tar.xz -C /opt/
          /opt/zephyr-sdk-0.17.4/setup.sh -t arm-zephyr-eabi -t riscv64-zephyr-elf
          rm zephyr-sdk-0.17.4_linux-x86_64_minimal.tar.xz

      - name: Build dongle (cpuapp USB HID + cpurad ESB sysbuild)
        run: west build --pristine=always --sysbuild -b nrf54h20dk/nrf54h20/cpuapp dongle

      - name: Check for forbidden Bluetooth symbols
        run: |
          if grep -q "CONFIG_BT.*=y" build/dongle/zephyr/.config build/remote_rad/zephyr/.config 2>/dev/null; then
            echo "ERROR: Bluetooth symbols found in build config (ESB-only receiver)"
            exit 1
          fi

      - name: Firmware size report
        run: /opt/zephyr-sdk-0.17.4/arm-zephyr-eabi/bin/arm-zephyr-eabi-size build/dongle/zephyr/zephyr.elf

      - name: Package firmware
        run: |
          mkdir -p release/dongle/zephyr release/remote_rad/zephyr release/uicr/zephyr
          cp build/dongle/zephyr/zephyr.hex release/dongle/zephyr/
          cp build/dongle/zephyr/bicr.hex release/dongle/zephyr/
          cp build/remote_rad/zephyr/zephyr.hex release/remote_rad/zephyr/
          cp build/uicr/zephyr/uicr.hex release/uicr/zephyr/
          cp build/uicr/zephyr/periphconf.hex release/uicr/zephyr/
          cp build/uicr/zephyr/zephyr.hex release/uicr/zephyr/
          cd release && zip -r ../dongle-${GITHUB_REF_NAME}-firmware.zip .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dongle-${{ github.ref_name }}-firmware.zip
          generate_release_notes: false
